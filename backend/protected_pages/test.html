<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow, noimageindex">
    <title>Document</title>
    <style>
        /* الهيدر والقائمة العلوية المطورة بنظام Flexbox المرن */
header {
    background-color: #00332a;
    border-bottom: 2px solid #00d5aa;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 70px; /* تحديد ارتفاع ثابت للهيدر لتسهيل حساب مسافة الأقسام بعده */
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: space-between; /* توزيع العناصر على الأطراف بالتساوي */
    padding: 0 20px;
    box-sizing: border-box;
    direction: rtl; /* توجيه العناصر من اليمين إلى اليسار */
}

/* القائمة الجانبية (أقصى اليمين) */
.menu-icon {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    width: 25px;
    height: 18px;
    cursor: pointer;
}
.menu-icon span {
    display: block;
    height: 3px;
    background-color: #00d5aa;
    border-radius: 2px;
}

/* الشعار في المنتصف تلقائياً ودون هوامش عشوائية */
.logo {
    font-size: 2rem;
    font-weight: bold;
    color: #00ffae;
    font-family: sans-serif;
    margin: 0;
    line-height: 1;
}

/* زر تبديل اللغة (أقصى اليسار) */
.lang-toggle {
    display: flex;
    align-items: center;
}
.lang-toggle button {
    background-color: #00d5aa;
    color: #00251f;
    border: none;
    padding: 8px 14px;
    border-radius: 8px;
    font-weight: bold;
    font-size: 0.9rem;
    cursor: pointer;
    transition: background-color 0.2s;
}
.lang-toggle button:hover {
    background-color: #00ffae;
}

/* تعديل أساسي لقسم البانر #bode1 ليتوافق مع طول الهيدر الجديد دون تداخل */
#bode1 {
    background-color: #00251f;
    min-height: 399px;
    margin-top: 70px; /* مسافة مساوية تماماً لارتفاع الهيدر الثابت */
    padding-top: 20px;
}
    </style>
</head>
<body>
    <header>
    <div class="menu-icon">
        <span></span>
        <span></span>
    </div>
    
    <div class="logo">tree</div>
    
    <div class="lang-toggle">
        <button id="toggleLang">EN/ع</button>
    </div>
</header>
</body>
</html>
