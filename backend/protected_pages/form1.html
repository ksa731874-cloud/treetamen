<!DOCTYPE html>
<html lang="ar" dir="rtl">
    <head><meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="robots" content="noindex, nofollow, noimageindex">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, minimal-ui">
    <link rel="stylesheet" href="form1.css">
    <title>نموذج تأمين سيارة</title><style>
        body {
            margin: 0;
            padding-top: 70px;
        }
        header {
            background-color: #00332a;
            border-bottom: 2px solid #00d5aa;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px; /* تحديد ارتفاع ثابت للهيدر لتسهيل حساب مسافة الأقسام بعده */
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between; /* توزيع العناصر على الأطراف بالتساوي */
            padding: 0 20px;
            box-sizing: border-box;
            direction: rtl; /* توجيه العناصر من اليمين إلى اليسار */
        }
        .menu-icon {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 25px;
            height: 18px;
            cursor: pointer;
        }
        .menu-icon span {
            display: block;
            height: 3px;
            background-color: #00d5aa;
            border-radius: 2px;
        }
        .logo {
            font-size: 2rem;
            font-weight: bold;
            color: #00ffae;
            font-family: sans-serif;
            margin: 0;
            line-height: 1;
        }
        .lang-toggle {
            display: flex;
            align-items: center;
        }
        .lang-toggle button {
            background-color: #00d5aa;
            color: #00251f;
            border: none;
            padding: 8px 14px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .lang-toggle button:hover {
            background-color: #00ffae;
        }
        #bode1 {
            background-color: #00251f;
            min-height: 399px;
            margin-top: 70px;
            padding-top: 20px;
        }
        
    </style></head><body data-page="form1"><header>
        <div class="menu-icon">
            <span></span>
            <span></span>
        </div>
        <div class="logo">tree</div>
        <div class="lang-toggle">
            <button id="toggleLang">EN/ع</button>
        </div>
    </header><div class="container">
        <div class="steps">
            <div class="active" data-i18n="step1">1<br>البيانات الأساسية</div>
            <div class="active" data-i18n="step2">2<br>بيانات التأمين</div>
            <div data-i18n="step3">3<br>قائمة الأسعار</div>
            <div data-i18n="step4">4<br>الملخص والدفع</div>
        </div><form id="insuranceForm"><div class="form-group">
            <label data-i18n="insuranceTypeLabel">نوع التأمين</label>
            <div class="insurance-type">
                <button type="button" class="active" onclick="selectType(this)" data-i18n="type_liability">ضد الغير</button>
                <button type="button" onclick="selectType(this)" data-i18n="type_comprehensive">شامل</button>
            </div></div><div class="form-row"><div class="form-group">
                <label data-i18n="startDateLabel">تاريخ بدء الوثيقة</label>
                <input id="namecar" type="date" name="startDate" required>
            </div><div class="form-group">
                
                <label data-i18n="usagePurposeLabel">الغرض من استخدام السيارة</label>
                <select id="selectcar" name="usagePurpose" required>
                    <option value="" data-i18n="usagePurposePlaceholder">الغرض من استخدام السيارة</option><option value="شخصي" data-i18n-option="personalOption">شخصي</option><option value="تجاري" data-i18n-option="commercialOption">تجاري</option><option value="نقل الركاب او كريم او اوبر " data-i18n-option="rideShareOption">نقل الركاب او كريم او اوبر</option><option value="نقل البضائع" data-i18n-option="cargoOption">نقل البضائع</option><option value="نقل مشتقات نفطية" data-i18n-option="fuelOption">نقل مشتقات نفطية</option></select></div></div><div class="form-row"><div class="form-group"><label data-i18n="carTypeLabel">نوع السيارة</label><input id="selectecare" type="text" name="carType" placeholder="نوع السيارة" data-i18n-placeholder="carTypeLabel" required></div><div class="form-group"><label data-i18n="estimatedValueLabel">القيمة التقديرية للسيارة</label><input id="amountcar" type="tel" name="estimatedValue" placeholder="القيمة التقديرية" data-i18n-placeholder="estimatedValueLabel" required></div></div><div class="form-group"><label data-i18n="manufactureYearLabel">سنة الصنع</label><input id="datecar" type="tel" name="manufactureYear" min="1900" max="2099" placeholder=" " data-i18n-placeholder="manufactureYearLabel" required></div><div class="radio-row"><label data-i18n="repairPlaceLabel">مكان الإصلاح:</label><label><input type="radio" name="repairPlace" value="الورشة" required data-i18n-option="repairShopOption">الورشة</label><label><input type="radio" name="repairPlace" value="الوكالة" data-i18n-option="agencyOption">الوكالة</label></div><button type="submit" class="submit-btn" data-i18n="showOffers">اظهار العروض</button></form></div>
                    
                    <script src="form1.js"></script><script src="lang.js"></script></body></html>
